<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>King Setup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #222;
position:sticky;
top:0;
background:#000;
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
color:gold;
}

.admin-btn{
background:gold;
color:black;
border:none;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}

.hero{
padding:50px 20px;
text-align:center;
}

.hero h1{
font-size:45px;
color:gold;
margin-bottom:15px;
}

.hero p{
color:#aaa;
margin-bottom:30px;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.search-box input{
width:70%;
max-width:400px;
padding:15px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-size:16px;
}

.search-box button{
padding:15px 20px;
background:gold;
border:none;
border-radius:10px;
font-weight:bold;
}

#adminPanel{
display:none;
background:#111;
padding:20px;
border-bottom:1px solid #222;
}

.admin-container{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.admin-container input{
padding:15px;
background:#000;
border:1px solid #333;
border-radius:10px;
color:white;
}

.admin-container button{
padding:15px;
background:gold;
border:none;
border-radius:10px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
border-color:gold;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.market{
font-size:12px;
color:#aaa;
margin-bottom:8px;
}

.price{
color:gold;
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.view-btn{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:10px;
font-weight:bold;
}

footer{
background:#111;
padding:30px 20px;
margin-top:40px;
border-top:1px solid #222;
text-align:center;
}

footer h2{
color:gold;
margin-bottom:10px;
}

footer p{
color:#777;
font-size:14px;
line-height:1.6;
}

.platforms{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.platforms span{
background:#222;
padding:10px 15px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">
King Setup
</div>

<button
class="admin-btn"
onclick="toggleAdmin()"
>
Admin
</button>

</header>

<div id="adminPanel">

<div class="admin-container">

<h2 style="color:gold;text-align:center;">
Admin Dashboard
</h2>

<input
type="text"
id="productTitle"
placeholder="Product Name"
>

<input
type="text"
id="productPrice"
placeholder="Product Price"
>

<input
type="text"
id="productImage"
placeholder="Product Image URL"
>

<input
type="text"
id="productMarket"
placeholder="Marketplace Name"
>

<button onclick="addProduct()">
Add Product
</button>

</div>

</div>

<section class="hero">

<h1>
Global Marketplace Search
</h1>

<p>
Search products instantly from multiple marketplaces
</p>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search products..."
>

<button onclick="searchProducts()">
Search
</button>

</div>

</section>

<section
class="products"
id="productContainer"
>

</section>

<footer>

<h2>
King Setup
</h2>

<p>
Dynamic marketplace search engine with admin control panel and product management system.
</p>

<div class="platforms">
<span>Amazon</span>
<span>Alibaba</span>
<span>AliExpress</span>
<span>eBay</span>
<span>Walmart</span>
</div>

<p style="margin-top:20px;">
© 2026 King Setup
</p>

</footer>

}

];

if(savedProducts){

products = JSON.parse(savedProducts);

}

function showProducts(items){

let container =
document.getElementById("productContainer");

container.innerHTML = "";

items.forEach(product => {

container.innerHTML += `

<div class="card">

<img src="${product.image}">

<div class="content">

<div class="market">
${product.market}
</div>

<h3>
${product.title}
</h3>

<div class="price">
${product.price}
</div>

<button class="view-btn">
View Product
</button>

</div>

</div>

`;

});

}

showProducts(products);

function searchProducts(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let filtered =
products.filter(product =>
product.title.toLowerCase().includes(input)
);

showProducts(filtered);

}

function toggleAdmin(){

let password =
prompt("Enter Admin Password");

if(password === "king123"){

let panel =
document.getElementById("adminPanel");

if(panel.style.display === "none"){

panel.style.display = "block";

}else{

panel.style.display = "none";

}

}else{

alert("Wrong Password");

}

}

function addProduct(){

let title =
document.getElementById("productTitle").value;

let price =
document.getElementById("productPrice").value;

let image =
document.getElementById("productImage").value;

let market =
document.getElementById("productMarket").value;

let newProduct = {

title:title,
price:price,
image:image,
market:market

};

products.push(newProduct);

localStorage.setItem(
"products",
JSON.stringify(products)
);

showProducts(products);

document.getElementById("productTitle").value = "";
document.getElementById("productPrice").value = "";
document.getElementById("productImage").value = "";
document.getElementById("productMarket").value = "";

}

</script>

</body>

</html>
