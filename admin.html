<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>King Setup Admin</title>

<link
rel="stylesheet"
href="style.css"
>

<style>

body{
background:#0a0a0a;
}

.admin-panel{
padding:20px;
}

.admin-title{
font-size:32px;
font-weight:bold;
color:gold;
margin-bottom:30px;
}

.admin-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.admin-card{
background:#111;
padding:20px;
border-radius:20px;
border:1px solid #222;
}

.admin-card h2{
margin-bottom:20px;
color:gold;
}

.control{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #222;
}

.control button{
padding:8px 14px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
}

.theme-btns{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.theme-btns button{
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.preview-box{
margin-top:30px;
background:#111;
padding:20px;
border-radius:20px;
border:1px solid #222;
}

.preview-box iframe{
width:100%;
height:500px;
border:none;
border-radius:20px;
background:white;
}

</style>

</head>

<body>

<div class="admin-panel">

<div class="admin-title">
KING SETUP ADMIN
</div>

<div class="admin-grid">

<div class="admin-card">

<h2>
Theme Engine
</h2>

<div class="theme-btns">

<button
onclick="setTheme('gold')"
>
Gold
</button>

<button
onclick="setTheme('blue')"
>
Blue
</button>

<button
onclick="setTheme('red')"
>
Red
</button>

<button
onclick="setTheme('green')"
>
Green
</button>

</div>

</div>

<div class="admin-card">

<h2>
Marketplace Control
</h2>

<div class="control">

<span>Amazon</span>

<button onclick="toggleMarket(this)">
ON
</button>

</div>

<div class="control">

<span>Alibaba</span>

<button onclick="toggleMarket(this)">
ON
</button>

</div>

<div class="control">

<span>AliExpress</span>

<button onclick="toggleMarket(this)">
ON
</button>

</div>

<div class="control">

<span>eBay</span>

<button onclick="toggleMarket(this)">
ON
</button>

</div>

</div>

<div class="admin-card">

<h2>
Product Control
</h2>

<div class="control">

<span>iPhone 15 Pro</span>

<button onclick="toggleProduct(this)">
ON
</button>

</div>

<div class="control">

<span>Gaming Laptop</span>

<button onclick="toggleProduct(this)">
ON
</button>

</div>

<div class="control">

<span>Luxury Watch</span>

<button onclick="toggleProduct(this)">
ON
</button>

</div>

</div>

</div>

<div class="preview-box">

<h2 style="margin-bottom:20px;color:gold;">
Live Customer Preview
</h2>

<iframe src="index.html"></iframe>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
